name: Update CF Rating & Recompile Resume

on:
  schedule:
    - cron: "0 3 * * *"   # daily 3:00 UTC (8:30 AM IST)
  workflow_dispatch: {}     # allow manual run from Actions tab
  push:
    paths:
      - "resume.tex"
      - "scripts/update_cf_rating.py"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest CF rating & solved count
        run: python3 scripts/update_cf_rating.py

      - name: Compile resume.tex to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cf_data.tex resume.pdf
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update CF rating in resume [skip ci]"
            git push
          fi
